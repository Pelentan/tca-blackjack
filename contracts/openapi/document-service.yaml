openapi: 3.1.0
info:
  title: TCA Blackjack - Document Service
  description: |
    Layout engine for PDF generation. Accepts structured block data,
    returns application/pdf binary. Stateless — request in, PDF out.

    See companion document document-service-contract.md for full rationale
    on the block model, caller allowlist design, and reserved fields.

    Design principles:
    - Layout engine, not document factory: callers shape their data into blocks,
      this service renders them. No domain knowledge — a transaction list and a
      game summary look identical here: both are blocks.
    - Stateless: no storage, no queue. Binary response returned directly.
    - TypeScript/Node.js with PDFKit.

    Block types (ordered array, rendered in sequence):
    - text: paragraph of prose
    - table: named table with CSV rows
    - footer: rendered at bottom of last page (only last footer block used)

    Caller allowlist: bank-service, game-state, auth-service.
    Unknown callers are rejected with unknown_caller.

    The logo and presentation fields are accepted but not yet implemented.
    See contract.md for reserved field details.

    Internal service — not externally exposed. No mTLS yet (TODO).
  version: 0.1.0


x-tca-security:
  transport: mtls
  tls-min-version: "1.2"
  client-cert-required: true
  reject-without-client-cert: true
  ca-cert: /certs/ca.crt
  service-cert: /certs/document-service.crt
  service-key: /certs/document-service.key
  implementation:
    server:
      load-ca-cert: true
      load-service-cert: true
      load-service-key: true
      require-and-verify-client-cert: true
    client:
      load-ca-cert: true
      load-service-cert: true
      load-service-key: true
      verify-server-cert: true
  notes: >
    Every inbound connection must present a certificate signed by the TCA CA.
    Connections without a valid client certificate must be rejected — not
    downgraded to unauthenticated. This applies to all endpoints including
    /health. Services that cannot present client certificates (e.g. Docker
    healthcheck probes) should be excluded from healthcheck configuration
    rather than relaxing this requirement.

servers:
  - url: https://document-service:3011
    description: Internal Docker network

paths:
  /health:
    get:
      summary: Service health with document counter
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /document:
    post:
      summary: Generate a PDF document from structured blocks
      description: |
        Renders blocks in order. Returns application/pdf binary directly —
        caller streams to client.

        Table rows are CSV strings. Column count must match headers array.
        Values containing commas must be quoted per RFC 4180.

        Only the last footer block in the array is rendered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
            example:
              caller: bank-service
              title: Transaction History
              heading: Bank Transactions — Player abc-123
              sub_heading: PlayerOne
              blocks:
                - text: "The following transactions were recorded for this account."
                - table:
                    name: Transactions
                    headers: [ID, Type, Amount, Balance After, Timestamp]
                    rows:
                      - "442acc80,bet,50.00,950.00,2026-02-28T21:09:02Z"
                      - "ddb9a06d,payout_loss,0.00,950.00,2026-02-28T21:09:13Z"
                - text: "Net result: -50.00 chips."
                - footer: "Generated by TCA Blackjack · document-service"
      responses:
        '200':
          description: PDF document
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="Transaction History-2026-02-28T21:00:00Z.pdf"'
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: PDF rendering failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    TextBlock:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Paragraph of prose. Multiple consecutive text blocks use standard paragraph spacing.

    TableBlock:
      type: object
      required: [table]
      properties:
        table:
          type: object
          required: [name, headers, rows]
          properties:
            name:
              type: string
              description: Rendered as a small heading above the table.
            headers:
              type: array
              items:
                type: string
              description: Column headers. Row column count must match.
            rows:
              type: array
              items:
                type: string
              description: |
                CSV strings — commas delimit columns. Column count must equal headers length.
                Values containing commas must be quoted per RFC 4180.

    FooterBlock:
      type: object
      required: [footer]
      properties:
        footer:
          type: string
          description: Rendered at bottom of last page. Only the last footer block in the array is used.

    Block:
      oneOf:
        - $ref: '#/components/schemas/TextBlock'
        - $ref: '#/components/schemas/TableBlock'
        - $ref: '#/components/schemas/FooterBlock'
      description: Exactly one key indicating block type.

    DocumentRequest:
      type: object
      required: [caller, title, blocks]
      properties:
        caller:
          type: string
          description: Calling service name. Must be in allowlist (bank-service, game-state, auth-service).
          example: bank-service
        title:
          type: string
          description: Document title — appears in PDF header and filename.
        logo:
          type: string
          format: uuid
          description: |
            RESERVED — accepted, ignored at render time.
            When implemented: resolves to image bytes via game-state, embedded in PDF header.
        heading:
          type: string
          description: Large heading rendered below title.
        sub_heading:
          type: string
          description: Smaller heading rendered below heading.
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/Block'
          minItems: 1
          description: Ordered array of content blocks rendered in sequence.
        presentation:
          type: object
          description: |
            RESERVED — accepted, validated, not yet acted upon. All documents render with
            default styling until implemented. Callers may begin sending this field;
            the contract will not change when presentation control is added.
          properties:
            font:
              type: string
              example: Helvetica
            colors:
              type: object
              properties:
                primary:
                  type: string
                  description: Hex color for headers and accents
                  example: "#1f6feb"
                secondary:
                  type: string
                  description: Hex color for subheadings and borders
                  example: "#8b949e"
                text:
                  type: string
                  description: Hex color for body text
                  example: "#24292f"
            page_size:
              type: string
              enum: [A4, Letter]
              default: Letter

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - unknown_caller
                - missing_required_fields
                - invalid_block
                - invalid_table_rows
                - render_failed
            message:
              type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
        service:
          type: string
          example: document-service
        language:
          type: string
          example: TypeScript
        library:
          type: string
          example: PDFKit
        documents_generated:
          type: integer
          description: In-memory counter, resets on restart.
