# ── TCA Blackjack (Tessellated Constellation Architecture) — Docker Compose ────
#
# Network isolation model — each network represents a trust boundary:
#
#   frontend-net   gateway ↔ ui (external-facing only)
#   game-net       gateway ↔ game-state ↔ deck, hand-evaluator, dealer-ai
#   financial-net  bank-service ↔ bank-db (+ gateway, game-state, auth, document)
#   auth-net       auth-service ↔ auth-db (+ auth-ui, email, gateway)
#   redis-net      redis ↔ auth, bank, observability, gateway (pub/sub)
#   obs-net        observability-service ↔ game-state, gateway
#   mail-net       email-service ↔ postfix (SMTP isolated)
#   data-net       game-state ↔ game-db (game DB isolated)
#   comm-net       gateway ↔ chat-service
#
# Key isolation properties:
#   bank-db    — unreachable from game domain, auth domain, redis, or any service
#                outside financial-net
#   auth-db    — unreachable from game domain, bank domain, or any service
#                outside auth-net
#   game-db    — unreachable from everything except game-state
#   postfix    — unreachable from everything except email-service
#   deck/hand/dealer-ai — unreachable from bank, auth, email, or observability
#
# Start:  docker compose up --build
# Stop:   docker compose down
# Logs:   docker compose logs -f [service-name]

name: tca-blackjack

networks:
  frontend-net:
    driver: bridge
  game-net:
    driver: bridge
  financial-net:
    driver: bridge
  auth-net:
    driver: bridge
  redis-net:
    driver: bridge
  obs-net:
    driver: bridge
  mail-net:
    driver: bridge
  data-net:
    driver: bridge
  comm-net:
    driver: bridge

volumes:
  game-db-data:
  bank-db-data:
  auth-db-data:
  redis-data:
  mtls-certs:   # Ephemeral cert volume — populated by cert-init, destroyed on compose down

services:

  # ── cert-init ──────────────────────────────────────────────────────────────
  # Runs once at startup. Generates ephemeral CA + per-service certs into
  # the mtls-certs volume. All other services depend on this completing
  # successfully before they start. Key material never touches the host
  # filesystem or any image layer.
  cert-init:
    build: ./cert-init
    container_name: tca-cert-init
    volumes:
      - mtls-certs:/certs
    restart: "no"  # Init container — run once and exit

  # ── Gateway ────────────────────────────────────────────────────────────────
  # On every network — single entry point, routes to all domains.
  # The only service with cross-domain visibility by design.
  gateway:
    build: ./gateway
    container_name: tca-gateway
    ports:
      - "8021:8021"
    environment:
      PORT: "8021"
      GAME_STATE_URL: "https://game-state:3001"
      AUTH_URL: "https://auth-service:3006"
      AUTH_UI_URL: "http://auth-ui-service:3010"
      BANK_URL: "https://bank-service:3005"
      CHAT_URL: "https://chat-service:3007"
      EMAIL_URL: "https://email-service:3008"
      DOCUMENT_URL: "http://document-service:3011"
      UI_URL: "http://ui:3000"
      REDIS_URL: "redis:6379"
      TLS_CERT: "/certs/gateway.crt"
      TLS_KEY:  "/certs/gateway.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - frontend-net
      - game-net
      - financial-net
      - auth-net
      - redis-net
      - obs-net
      - comm-net
    depends_on:
      cert-init:
        condition: service_completed_successfully
      game-state:
        condition: service_started
      auth-service:
        condition: service_started
      redis:
        condition: service_started
      observability-service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/wget", "-qO-", "http://localhost:8021/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Game Domain ────────────────────────────────────────────────────────────
  # game-state orchestrates; deck/hand-evaluator/dealer-ai are internal only.
  # Nothing outside game-net can reach deck, hand-evaluator, or dealer-ai.
  game-state:
    build: ./game-state
    container_name: tca-game-state
    environment:
      PORT: "3001"
      DECK_SERVICE_URL: "https://deck-service:3002"
      HAND_EVALUATOR_URL: "https://hand-evaluator:3003"
      DEALER_AI_URL: "https://dealer-ai:3004"
      OBSERVABILITY_URL: "http://observability-service:3009"
      BANK_SERVICE_URL: "https://bank-service:3005"
      TLS_CERT: "/certs/game-state.crt"
      TLS_KEY:  "/certs/game-state.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - game-net       # deck, hand-evaluator, dealer-ai, gateway
      - financial-net  # bank-service
      - obs-net        # observability-service
      - data-net       # game-db
    depends_on:
      cert-init:
        condition: service_completed_successfully
      deck-service:
        condition: service_started
      hand-evaluator:
        condition: service_started
      dealer-ai:
        condition: service_started
      observability-service:
        condition: service_started
      bank-service:
        condition: service_started
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  deck-service:
    build: ./deck-service
    container_name: tca-deck-service
    environment:
      PORT: "3002"
      TLS_CERT: "/certs/deck-service.crt"
      TLS_KEY:  "/certs/deck-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - game-net  # game-state only — nothing else can route here
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  hand-evaluator:
    build: ./hand-evaluator
    container_name: tca-hand-evaluator
    environment:
      PORT: "3003"
      TLS_CERT: "/certs/hand-evaluator.crt"
      TLS_KEY:  "/certs/hand-evaluator.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - game-net  # game-state only
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # No healthcheck — internal service on isolated network.
    # Startup ordering handled by cert-init dependency.

  dealer-ai:
    build: ./dealer-ai
    container_name: tca-dealer-ai
    environment:
      PORT: "3004"
      TLS_CERT: "/certs/dealer-ai.crt"
      TLS_KEY:  "/certs/dealer-ai.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - game-net  # game-state only
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  # ── Security & Financial Domain ────────────────────────────────────────────
  # bank-db is on financial-net only — unreachable from every other domain.
  # auth-db is on auth-net only — same guarantee.
  auth-service:
    build: ./auth-service
    container_name: tca-auth
    env_file:
      - auth.env
    environment:
      PORT: "3006"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "tca-blackjack-dev-secret-change-in-production"
      EMAIL_URL: "http://email-service:3008"
      DOCUMENT_URL: "http://document-service:3011"
      BANK_URL: "https://bank-service:3005"
      GATEWAY_URL: "http://localhost:8021"
      UI_URL: "http://localhost:8021"
      TLS_CERT: "/certs/auth-service.crt"
      TLS_KEY:  "/certs/auth-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - auth-net       # auth-db, auth-ui-service, email-service, gateway
      - financial-net  # bank-service, document-service
      - redis-net      # redis (sessions, exchange codes)
    depends_on:
      cert-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      auth-db:
        condition: service_started
      email-service:
        condition: service_started
      bank-service:
        condition: service_started
      postfix:
        condition: service_started
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  auth-ui-service:
    build: ./auth-ui-service
    container_name: tca-auth-ui
    environment:
      PORT: "3010"
      AUTH_SERVICE_URL: "https://auth-service:3006"
      TLS_CERT: "/certs/auth-ui-service.crt"
      TLS_KEY:  "/certs/auth-ui-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - auth-net  # auth-service only — nothing else needed
    depends_on:
      cert-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/wget", "-qO-", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bank-service:
    build: ./bank-service
    container_name: tca-bank
    env_file:
      - bank.env
    environment:
      PORT: "3005"
      DOCUMENT_SERVICE_URL: "http://document-service:3011"
      TLS_CERT: "/certs/bank-service.crt"
      TLS_KEY:  "/certs/bank-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - financial-net  # bank-db, document-service, gateway, game-state, auth-service
      - redis-net      # redis (balance pub/sub)
    depends_on:
      cert-init:
        condition: service_completed_successfully
      bank-db:
        condition: service_started
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  document-service:
    build: ./document-service
    container_name: tca-document
    environment:
      PORT: "3011"
    networks:
      - financial-net  # called by bank-service and auth-service (both on financial-net)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Communication Domain ────────────────────────────────────────────────────
  chat-service:
    build: ./chat-service
    container_name: tca-chat
    environment:
      PORT: "3007"
      TLS_CERT: "/certs/chat-service.crt"
      TLS_KEY:  "/certs/chat-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - comm-net  # gateway only — isolated from all other domains
    depends_on:
      cert-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # No healthcheck — internal service on isolated network

  email-service:
    build: ./email-service
    container_name: tca-email
    environment:
      PORT: "3008"
      SMTP_HOST: "postfix"
      SMTP_PORT: "25"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_USE_TLS: "false"
      AUTH_SERVICE_URL: "http://auth-service:3006"
      TLS_CERT: "/certs/email-service.crt"
      TLS_KEY:  "/certs/email-service.key"
      TLS_CA:   "/certs/ca.crt"
    volumes:
      - mtls-certs:/certs:ro
    networks:
      - auth-net   # auth-service (lookup, verification)
      - mail-net   # postfix (SMTP delivery)
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postfix:
        condition: service_started
    restart: unless-stopped

  # ── Mail ───────────────────────────────────────────────────────────────────
  # Postfix is on mail-net only — the only service that can reach it is email-service.
  # No other service can attempt SMTP delivery.
  postfix:
    build: ./postfix
    container_name: tca-postfix
    environment:
      MAIL_HOSTNAME: "tca-blackjack.local"
      MAIL_FROM_DOMAIN: "tca-blackjack.local"
      SMTP_RELAY_HOST: "${SMTP_RELAY_HOST}"
      SMTP_RELAY_PORT: "${SMTP_RELAY_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - mail-net  # email-service only
    restart: unless-stopped

  # ── UI ─────────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      args:
        VITE_GATEWAY_URL: ""
    container_name: tca-ui
    networks:
      - frontend-net  # gateway only — no internal service access
    depends_on:
      - gateway
    restart: unless-stopped

  # ── Data Tier ──────────────────────────────────────────────────────────────
  game-db:
    image: postgres:16-alpine
    container_name: tca-game-db
    environment:
      POSTGRES_DB: gamedb
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
    volumes:
      - game-db-data:/var/lib/postgresql/data
    networks:
      - data-net  # game-state only — no other service on this network
    restart: unless-stopped

  bank-db:
    image: postgres:16-alpine
    container_name: tca-bank-db
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - bank-db-data:/var/lib/postgresql/data
    networks:
      - financial-net  # bank-service only has DB credentials
                       # gateway is also on financial-net but speaks HTTP, not PostgreSQL
    restart: unless-stopped

  auth-db:
    image: postgres:16-alpine
    container_name: tca-auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass_dev
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - auth-net  # auth-service only has DB credentials
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tca-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - redis-net  # auth (sessions), bank (balance pub/sub), observability (events), gateway
    restart: unless-stopped

  # ── Observability ──────────────────────────────────────────────────────────
  observability-service:
    build: ./observability-service
    container_name: tca-observability
    environment:
      PORT: "3009"
      REDIS_URL: "redis:6379"
    networks:
      - obs-net    # game-state reports here, gateway subscribes here
      - redis-net  # redis pub/sub
    depends_on:
      - redis
    restart: unless-stopped
